<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>豆包实时语音助理 Demo</title>
<style>
  @font-face {
    font-family: 'Material Icons Round';
    font-style: normal;
    font-weight: 400;
    font-display: block;
    src: url(https://registry.npmmirror.com/material-icons/1.13.12/files/iconfont/material-icons-round.woff2) format('woff2'),
         url(https://registry.npmmirror.com/material-icons/1.13.12/files/iconfont/material-icons-round.woff) format('woff');
  }
  .material-icons-round {
    font-family: 'Material Icons Round';
    font-weight: normal;
    font-style: normal;
    font-size: 24px;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-smoothing: antialiased;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #5b4fff;
    --accent-glow: rgba(91,79,255,0.35);
    --ink: #0e0e12;
    --ink-soft: #6b6b80;
    --surface: #f4f4f8;
    --white: #ffffff;
    --success: #00c48c;
    --danger: #ff4d6d;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0e0e12 0%, #1a1240 50%, #0e0e12 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--ink);
    padding: 24px;
  }

  /* ─── 页面标题 ─── */
  .page-header {
    text-align: center;
    margin-bottom: 40px;
    color: #fff;
  }
  .page-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .page-title span {
    background: linear-gradient(90deg, #a78bfa, #818cf8, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .page-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
  }

  /* ─── 触发按钮（圆形悬浮助理入口）─── */
  .assistant-trigger {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5b4fff, #9b59f5);
    border: none;
    box-shadow: 0 8px 32px rgba(91,79,255,0.55), 0 0 0 0 rgba(91,79,255,0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    gap: 3px;
    padding: 0;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: triggerPulse 3s ease-in-out infinite;
    position: relative;
  }
  .assistant-trigger:active {
    transform: scale(0.92);
    box-shadow: 0 4px 16px rgba(91,79,255,0.55);
  }
  .assistant-trigger .material-icons-round {
    font-size: 26px !important;
    color: #fff;
  }
  .assistant-trigger-label {
    font-size: 10px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.3px;
    line-height: 1;
    font-weight: 600;
  }

  @keyframes triggerPulse {
    0%, 100% { box-shadow: 0 8px 32px rgba(91,79,255,0.55), 0 0 0 0 rgba(91,79,255,0.4); }
    50%       { box-shadow: 0 8px 32px rgba(91,79,255,0.55), 0 0 0 16px rgba(91,79,255,0); }
  }

  /* ─── 提示文字 ─── */
  .trigger-hint {
    margin-top: 20px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    letter-spacing: 0.3px;
  }

  /* ─── Modal 遮罩 ─── */
  #doubao-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9000;
    background: rgba(0,0,0,0.6);
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: overlayFadeIn 0.22s ease;
  }
  #doubao-modal.visible { display: flex; }

  @keyframes overlayFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ─── Modal 面板 ─── */
  .doubao-panel {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 28px 28px 0 0;
    padding: 0 0 env(safe-area-inset-bottom, 0);
    box-shadow: 0 -12px 60px rgba(0,0,0,0.22);
    animation: panelSlideUp 0.28s cubic-bezier(0.34,1.1,0.64,1);
    overflow: hidden;
  }
  @keyframes panelSlideUp {
    from { transform: translateY(100%); opacity: 0.4; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* ─── 面板头部渐变背景 ─── */
  .doubao-panel-header {
    background: linear-gradient(160deg, #f0eeff 0%, #fff 60%);
    padding: 20px 20px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(91,79,255,0.08);
  }
  .doubao-avatar-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .doubao-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5b4fff, #9b59f5);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(91,79,255,0.4);
    flex-shrink: 0;
    position: relative;
  }
  /* 说话时外圈光晕 */
  .doubao-avatar::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid rgba(91,79,255,0.35);
    opacity: 0;
    transition: opacity 0.3s;
    animation: avatarGlow 1.6s ease-in-out infinite;
  }
  #doubao-modal.listening .doubao-avatar::after { opacity: 1; border-color: rgba(0,196,140,0.5); }

  @keyframes avatarGlow {
    0%,100% { transform: scale(1);    opacity: 0.6; }
    50%      { transform: scale(1.08); opacity: 1;   }
  }

  .doubao-avatar .material-icons-round {
    font-size: 22px !important;
    color: #fff;
  }
  .doubao-info-col {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .doubao-name {
    font-weight: 800;
    font-size: 16px;
    color: var(--ink);
    letter-spacing: -0.2px;
  }
  #doubao-status-text {
    font-size: 12px;
    color: var(--ink-soft);
    transition: color 0.3s;
  }
  #doubao-modal.listening #doubao-status-text { color: var(--success); }

  .doubao-close-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.12s;
    flex-shrink: 0;
  }
  .doubao-close-btn:active { transform: scale(0.88); background: rgba(0,0,0,0.12); }
  .doubao-close-btn .material-icons-round { font-size: 18px !important; color: var(--ink-soft); }

  /* ─── 面板主体 ─── */
  .doubao-panel-body {
    padding: 20px 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ─── 字幕气泡 ─── */
  .doubao-subtitle-bubble {
    min-height: 60px;
    padding: 14px 16px;
    background: var(--surface);
    border-radius: 18px;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.65;
    word-break: break-all;
    position: relative;
    border: 1.5px solid transparent;
    transition: border-color 0.3s;
  }
  #doubao-modal.listening .doubao-subtitle-bubble {
    border-color: rgba(0,196,140,0.2);
    background: rgba(0,196,140,0.04);
  }
  .doubao-subtitle-empty {
    color: var(--ink-soft);
    font-size: 14px;
    font-style: italic;
  }

  /* ─── 波形可视化 ─── */
  .doubao-wave-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    height: 48px;
  }
  @keyframes doubao-wave {
    0%,100% { transform: scaleY(0.25); opacity: 0.5; }
    50%      { transform: scaleY(1);    opacity: 1;   }
  }
  .doubao-bar {
    width: 5px;
    height: 32px;
    border-radius: 4px;
    background: linear-gradient(to top, #5b4fff, #9b59f5);
    transform-origin: bottom;
    transform: scaleY(0.25);
    animation: doubao-wave 1.1s ease-in-out infinite;
    transition: background 0.4s;
  }
  .doubao-bar:nth-child(1){ animation-delay: 0s;    }
  .doubao-bar:nth-child(2){ animation-delay: .14s;  }
  .doubao-bar:nth-child(3){ animation-delay: .28s;  }
  .doubao-bar:nth-child(4){ animation-delay: .42s;  }
  .doubao-bar:nth-child(5){ animation-delay: .56s;  }
  .doubao-bar:nth-child(6){ animation-delay: .70s;  }
  .doubao-bar:nth-child(7){ animation-delay: .84s;  }

  #doubao-modal.listening .doubao-bar {
    background: linear-gradient(to top, #00c48c, #00e6a8);
  }

  /* 空闲时波形停止 */
  .doubao-bar.idle { animation-play-state: paused; transform: scaleY(0.12); opacity: 0.3; }

  /* ─── "点击开始说话"按钮 ─── */
  #doubao-tap-btn {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #5b4fff, #9b59f5);
    color: #fff;
    border-radius: 28px;
    padding: 16px 28px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(91,79,255,0.4);
    transition: transform 0.12s, box-shadow 0.12s;
    border: none;
    letter-spacing: 0.3px;
  }
  #doubao-tap-btn:active {
    transform: scale(0.96);
    box-shadow: 0 4px 12px rgba(91,79,255,0.4);
  }
  #doubao-tap-btn .material-icons-round { font-size: 20px !important; }

  /* ─── 底部提示 ─── */
  .doubao-footer-hint {
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
    padding-bottom: 4px;
  }

  /* ─── 状态指示器点 ─── */
  .doubao-status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #d0d0da;
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  #doubao-modal.listening .doubao-status-dot {
    background: var(--success);
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%,100% { opacity: 0.5; transform: scale(0.7); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  /* ─── 嵌入使用示例卡片 ─── */
  .demo-card {
    margin-top: 36px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px 24px;
    max-width: 360px;
    width: 100%;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    line-height: 1.7;
  }
  .demo-card-title {
    color: rgba(255,255,255,0.85);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .demo-card-title .material-icons-round { font-size: 14px !important; color: var(--accent); }
  code {
    background: rgba(91,79,255,0.2);
    border: 1px solid rgba(91,79,255,0.3);
    border-radius: 5px;
    padding: 1px 6px;
    font-family: monospace;
    font-size: 12px;
    color: #a78bfa;
  }
</style>
</head>

<!-- ══ 豆包智能助理 JS（完整独立版）══ -->
<script>
// ── 配置：可按需修改 ─────────────────────────────────────────
// 系统提示词（可在页面其他地方覆写 window._doubaoSystemPrompt）
window._doubaoSystemPrompt = window._doubaoSystemPrompt || '你是一个亲切的智能助理，请用简短口语化的方式回答用户问题，每次不超过3句话。';

// Render WS 代理地址（鉴权由 Render 服务端处理，前端无需 key）
const DOUBAO_WS_PROXY = 'wss://doubao-ws-proxy.onrender.com/proxy';
// ────────────────────────────────────────────────────────────

// ─── 内部状态 ────────────────────────────────────────────────
let _doubaoWs         = null;
let _doubaoState      = 'idle'; // idle | listening | speaking
let _doubaoSid        = null;
let _doubaoSeq        = 2;
let _doubaoMicStream  = null;
let _doubaoAudioCtx   = null;
let _doubaoSourceNode = null;
let _doubaoProcessor  = null;
let _doubaoChunks     = [];
let _doubaoAudioQueue = [];
let _doubaoPlaying    = false;

// ─── 工具函数 ────────────────────────────────────────────────
function _doubaoUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function _doubaoEncode(eventId, payload, sessionId) {
  const header = new Uint8Array([0x11, 0x14, 0x10, 0x00]);
  const parts = [];
  const evtBuf = new ArrayBuffer(4);
  new DataView(evtBuf).setUint32(0, eventId, false);
  parts.push(new Uint8Array(evtBuf));
  if (sessionId) {
    const sBytes = new TextEncoder().encode(sessionId);
    const sLen = new ArrayBuffer(4);
    new DataView(sLen).setUint32(0, sBytes.byteLength, false);
    parts.push(new Uint8Array(sLen));
    parts.push(sBytes);
  }
  const pBytes = typeof payload === 'string'
    ? new TextEncoder().encode(payload)
    : (payload instanceof Uint8Array ? payload : new Uint8Array(payload));
  const pLen = new ArrayBuffer(4);
  new DataView(pLen).setUint32(0, pBytes.byteLength, false);
  parts.push(new Uint8Array(pLen));
  parts.push(pBytes);
  const totalLen = parts.reduce((s, p) => s + p.byteLength, header.byteLength);
  const out = new Uint8Array(totalLen);
  let offset = 0;
  out.set(header, offset); offset += header.byteLength;
  parts.forEach(p => { out.set(p, offset); offset += p.byteLength; });
  return out.buffer;
}

function _doubaoParseFrame(buf) {
  const dv = new DataView(buf);
  const headerSize = (dv.getUint8(0) & 0x0f) * 4;
  const msgType = (dv.getUint8(1) >> 4) & 0x0f;
  const flags   = dv.getUint8(1) & 0x0f;
  let offset = headerSize;
  if (msgType === 15) { offset += 4; }
  if (flags & 0x03) offset += 4;
  let eventId = 0;
  if (flags & 0x04) { eventId = dv.getUint32(offset, false); offset += 4; }
  let sessionId = null;
  if (offset + 4 <= buf.byteLength) {
    const sidLen = dv.getUint32(offset, false);
    if (sidLen > 0 && sidLen < 200 && offset + 4 + sidLen <= buf.byteLength) {
      offset += 4;
      sessionId = new TextDecoder().decode(new Uint8Array(buf, offset, sidLen));
      offset += sidLen;
    }
  }
  let payload = null;
  if (offset + 4 <= buf.byteLength) {
    const pLen = dv.getUint32(offset, false);
    offset += 4;
    if (pLen > 0 && offset + pLen <= buf.byteLength) {
      payload = buf.slice(offset, offset + pLen);
    }
  }
  return { msgType, eventId, sessionId, payload };
}

// ─── UI 工具 ─────────────────────────────────────────────────
function _doubaoSetStatus(text) {
  const el = document.getElementById('doubao-status-text');
  if (el) el.textContent = text;
}

function _doubaoSetSubtitle(text) {
  const el = document.getElementById('doubao-subtitle');
  if (!el) return;
  if (!text) {
    el.innerHTML = '<span class="doubao-subtitle-empty">等待对话开始…</span>';
  } else {
    el.textContent = text;
  }
}

function _doubaoSetWaveActive(active) {
  document.querySelectorAll('.doubao-bar').forEach(b => {
    if (active) b.classList.remove('idle');
    else        b.classList.add('idle');
  });
}

// ─── 音频播放队列 ─────────────────────────────────────────────
function _doubaoFlushAudio() {
  if (_doubaoChunks.length === 0) return;
  const total  = _doubaoChunks.reduce((s, c) => s + c.byteLength, 0);
  const merged = new Uint8Array(total);
  let off = 0;
  _doubaoChunks.forEach(c => { merged.set(new Uint8Array(c), off); off += c.byteLength; });
  _doubaoChunks = [];
  const blob = new Blob([merged], { type: 'audio/ogg; codecs=opus' });
  _doubaoAudioQueue.push(URL.createObjectURL(blob));
  _doubaoPlayNext();
}

function _doubaoPlayNext() {
  if (_doubaoPlaying || _doubaoAudioQueue.length === 0) return;
  _doubaoPlaying = true;
  const url   = _doubaoAudioQueue.shift();
  const audio = new Audio(url);
  const done  = () => { URL.revokeObjectURL(url); _doubaoPlaying = false; _doubaoPlayNext(); };
  audio.onended = done;
  audio.onerror = done;
  audio.play().catch(done);
}

function _doubaoStopAudio() {
  _doubaoAudioQueue = [];
  _doubaoChunks     = [];
  _doubaoPlaying    = false;
}

// ─── 麦克风 ──────────────────────────────────────────────────
async function _doubaoStartMic() {
  try {
    _doubaoMicStream  = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    _doubaoAudioCtx   = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    _doubaoSourceNode = _doubaoAudioCtx.createMediaStreamSource(_doubaoMicStream);
    _doubaoProcessor  = _doubaoAudioCtx.createScriptProcessor(512, 1, 1);
    _doubaoProcessor.onaudioprocess = (e) => {
      if (!_doubaoWs || _doubaoWs.readyState !== WebSocket.OPEN) return;
      const f32 = e.inputBuffer.getChannelData(0);
      const i16 = new Int16Array(f32.length);
      f32.forEach((v, i) => { i16[i] = Math.max(-32768, Math.min(32767, v * 32767)); });
      _doubaoWs.send(_doubaoEncodeAudio(i16.buffer));
    };
    _doubaoSourceNode.connect(_doubaoProcessor);
    _doubaoProcessor.connect(_doubaoAudioCtx.destination);
    _doubaoSetWaveActive(true);
  } catch(e) {
    _doubaoSetStatus('麦克风错误: ' + (e.name || e.message));
    console.warn('[Doubao] mic error', e);
  }
}

function _doubaoStopMic() {
  try { _doubaoProcessor?.disconnect(); }  catch(_){}
  try { _doubaoSourceNode?.disconnect(); } catch(_){}
  try { _doubaoAudioCtx?.close(); }        catch(_){}
  if (_doubaoMicStream) { _doubaoMicStream.getTracks().forEach(t => t.stop()); _doubaoMicStream = null; }
  _doubaoProcessor  = null;
  _doubaoSourceNode = null;
  _doubaoAudioCtx   = null;
  _doubaoSetWaveActive(false);
}

function _doubaoEncodeAudio(pcmBuf) {
  const header = new Uint8Array([0x11, 0x25, 0x00, 0x00]);
  _doubaoSeq++;
  const seqBuf = new ArrayBuffer(4); new DataView(seqBuf).setInt32(0, _doubaoSeq, false);
  const evtBuf = new ArrayBuffer(4); new DataView(evtBuf).setUint32(0, 200, false);
  const sBytes = _doubaoSid ? new TextEncoder().encode(_doubaoSid) : new Uint8Array(0);
  const sLen   = new ArrayBuffer(4); new DataView(sLen).setUint32(0, sBytes.byteLength, false);
  const pBytes = new Uint8Array(pcmBuf);
  const pLen   = new ArrayBuffer(4); new DataView(pLen).setUint32(0, pBytes.byteLength, false);
  const total  = 4 + 4 + 4 + 4 + sBytes.byteLength + 4 + pBytes.byteLength;
  const out    = new Uint8Array(total);
  let o = 0;
  out.set(header, o); o += 4;
  out.set(new Uint8Array(seqBuf), o); o += 4;
  out.set(new Uint8Array(evtBuf), o); o += 4;
  out.set(new Uint8Array(sLen), o); o += 4;
  out.set(sBytes, o); o += sBytes.byteLength;
  out.set(new Uint8Array(pLen), o); o += 4;
  out.set(pBytes, o);
  return out.buffer;
}

// ─── WebSocket 事件发送 ──────────────────────────────────────
function _doubaoSendEvent(eventId, jsonStr) {
  if (!_doubaoWs || _doubaoWs.readyState !== WebSocket.OPEN) return;
  _doubaoWs.send(_doubaoEncode(eventId, jsonStr, _doubaoSid));
}

function _doubaoSendStartConnection() {
  if (!_doubaoWs || _doubaoWs.readyState !== WebSocket.OPEN) return;
  _doubaoWs.send(_doubaoEncode(1, '{}', null));
}

function _doubaoSanitizePrompt(str) {
  if (!str) return '';
  return str
    .replace(/[\r\n\t]/g, ' ')
    .replace(/\\/g, '、')
    .replace(/["]/g, '')
    .replace(/\s{2,}/g, ' ')
    .trim()
    .substring(0, 500);
}

function _doubaoSendStartSession() {
  const safePrompt = _doubaoSanitizePrompt(window._doubaoSystemPrompt || '你是一个亲切的智能助理。');
  const payload = {
    tts: {
      speaker: window._doubaoSpeaker || 'zh_female_vv_jupiter_bigtts',
      audio_config: { channel: 1, format: 'ogg_opus', sample_rate: 24000 },
      extra: {}
    },
    asr: {
      audio_info: { format: 'pcm', sample_rate: 16000, channel: 1 }
    },
    dialog: {
      bot_name:       '助理',
      system_role:    safePrompt,
      speaking_style: '口语化、简短，每次不超过3句话',
      extra: { model: '1.2.1.1', input_mod: 'keep_alive', strict_audit: false }
    }
  };
  _doubaoSendEvent(100, JSON.stringify(payload));
}

// ─── WebSocket 消息处理 ──────────────────────────────────────
function _doubaoHandleMessage(evt) {
  if (!(evt.data instanceof ArrayBuffer)) return;
  const frame = _doubaoParseFrame(evt.data);
  const { msgType, eventId, payload } = frame;

  // 文本事件
  if (msgType === 9 && payload) {
    let json = {};
    try { json = JSON.parse(new TextDecoder().decode(payload)); } catch(_){}
    const eid = eventId;

    if (eid === 50) { // ConnectionStarted
      _doubaoSetStatus('连接成功，正在初始化…');
      _doubaoSendStartSession();

    } else if (eid === 150) { // SessionStarted
      _doubaoState = 'listening';
      _doubaoSetStatus('点击下方开始说话');
      document.getElementById('doubao-modal')?.classList.add('listening');
      const tapBtn = document.getElementById('doubao-tap-btn');
      if (tapBtn) {
        tapBtn.style.display = 'flex';
        tapBtn.onclick = () => {
          tapBtn.style.display = 'none';
          _doubaoSetStatus('正在聆听…');
          _doubaoStartMic();
        };
      }

    } else if (eid === 350) { // TTSSentenceStart
      const text = json.text || '';
      if (text) _doubaoSetSubtitle(text);
      _doubaoState = 'speaking';
      _doubaoSetStatus('助理正在说话…');
      document.getElementById('doubao-modal')?.classList.remove('listening');
      _doubaoSetWaveActive(true);

    } else if (eid === 351) { // TTSSentenceEnd
      _doubaoFlushAudio();

    } else if (eid === 359) { // TTSEnded
      _doubaoFlushAudio();
      _doubaoState = 'listening';
      _doubaoSetStatus('正在聆听…');
      document.getElementById('doubao-modal')?.classList.add('listening');

    } else if (eid === 450) { // ASRInfo — 用户开口，打断播放
      _doubaoStopAudio();

    } else if (eid === 451) { // ASRResponse
      const text = (json.results || []).map(r => r.text).join('');
      if (text) { _doubaoSetStatus('我听到：' + text); _doubaoSetSubtitle(text); }

    } else if (eid === 153 || eid === 599) { // 错误
      _doubaoSetStatus('连接出错，请重试');
      console.warn('[Doubao] server error', eid, json);
    }
  }

  // 音频数据
  if (msgType === 11 && payload) {
    _doubaoChunks.push(payload);
  }
}

// ─── 公开接口 ─────────────────────────────────────────────────

async function openDoubaoAssistant() {
  const modal = document.getElementById('doubao-modal');
  if (!modal) return;
  modal.classList.add('visible');
  _doubaoSetStatus('正在连接…');
  _doubaoSetSubtitle('');
  _doubaoChunks = [];
  _doubaoSetWaveActive(false);

  // 隐藏点击说话按钮
  const tapBtn = document.getElementById('doubao-tap-btn');
  if (tapBtn) tapBtn.style.display = 'none';

  _doubaoSid = _doubaoUUID();
  _doubaoSeq = 2;

  // 建立 WebSocket（鉴权由 Render proxy 服务端处理）
  const wsUrl = new URL(DOUBAO_WS_PROXY);
  wsUrl.searchParams.set('session_id', 'demo_' + Date.now());
  _doubaoWs = new WebSocket(wsUrl.toString());
  _doubaoWs.binaryType = 'arraybuffer';

  _doubaoWs.onopen = () => {
    _doubaoSetStatus('握手成功…');
    _doubaoSendStartConnection();
  };
  _doubaoWs.onmessage = (evt) => _doubaoHandleMessage(evt);
  _doubaoWs.onerror   = (e) => {
    _doubaoSetStatus('WebSocket 错误，请检查网络');
    console.warn('[Doubao] ws error', e);
  };
  _doubaoWs.onclose   = (e) => {
    _doubaoStopMic();
    _doubaoSetStatus('连接已断开 (code ' + e.code + ')');
    _doubaoState = 'idle';
    _doubaoSetWaveActive(false);
    document.getElementById('doubao-modal')?.classList.remove('listening');
  };
}

function closeDoubaoAssistant() {
  const modal = document.getElementById('doubao-modal');
  if (modal) {
    modal.classList.remove('visible', 'listening');
  }
  try {
    if (_doubaoWs && _doubaoWs.readyState === WebSocket.OPEN) {
      _doubaoSendEvent(102, '{}'); // FinishSession
      setTimeout(() => {
        _doubaoSendEvent(2, '{}'); // FinishConnection
        setTimeout(() => { try { _doubaoWs?.close(); } catch(_){} }, 300);
      }, 300);
    }
  } catch(_){}
  _doubaoStopMic();
  _doubaoStopAudio();
  _doubaoWs    = null;
  _doubaoState = 'idle';
  _doubaoSetWaveActive(false);
}

// 点击遮罩关闭（可选行为）
function handleModalBgClick(e) {
  if (e.target === document.getElementById('doubao-modal')) {
    closeDoubaoAssistant();
  }
}
</script>
