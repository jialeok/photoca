<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 连接测试</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: monospace; background: #0e0e12; color: #a0a0b0; padding: 20px; font-size: 14px; line-height: 2; }
        .ok  { color: #00c48c; }
        .err { color: #ff4d6d; }
        .warn{ color: #f59e0b; }
        button { margin-top: 20px; padding: 14px 28px; background: #5b4fff; color: #fff; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; display: block; width: 100%; }
    </style>
</head>
<body>
<div id="log">正在初始化...<br></div>
<button onclick="testAll()">🔁 重新测试</button>

<script>
const SUPABASE_URL = 'https://fuaamwgdbxymxbhmstxc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1YWFtd2dkYnh5bXhiaG1zdHhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ1OTEsImV4cCI6MjA5NDM0MDU5MX0.bKqwuNPV6iaozjCHBXGyj_sgfJt8oNfngnSyftmqb-g';

function log(cls, msg) {
    document.getElementById('log').innerHTML += '<span class="'+cls+'">'+msg+'</span><br>';
}

async function testAll() {
    document.getElementById('log').innerHTML = '';
    log('warn', '═══ Supabase 连接诊断 ═══');

    // 1. SDK
    if (typeof window.supabase === 'undefined') {
        log('err', '❌ SDK 未加载（CDN 被微信拦截？）'); return;
    }
    log('ok', '✅ SDK 加载成功');

    // 2. createClient
    let sb;
    try {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        log('ok', '✅ createClient 成功');
    } catch(e) {
        log('err', '❌ createClient 失败: ' + e.message); return;
    }

    // 3. 读取 uploads 表
    log('warn', '· 测试读取 uploads 表...');
    const { data: readData, error: readErr } = await sb.from('uploads').select('id').limit(1);
    if (readErr) {
        log('err', '❌ 读取失败: ' + readErr.message);
        log('err', '  → 可能原因: 表不存在 或 RLS 未开放');
    } else {
        log('ok', '✅ 读取成功，表存在');
    }

    // 4. 写入 uploads 表
    log('warn', '· 测试写入 uploads 表...');
    const { error: insertErr } = await sb.from('uploads').insert({
        session: 'test_' + Date.now(),
        image_url: 'https://test.com/test.jpg',
        uploaded: true
    });
    if (insertErr) {
        log('err', '❌ 写入失败: ' + insertErr.message);
        log('err', '  → 可能原因: RLS 策略禁止 INSERT，或列名不对');
    } else {
        log('ok', '✅ 写入成功！数据库正常');
    }

    // 5. 测试 Storage bucket
    log('warn', '· 测试 Storage photos bucket...');
    const { data: buckets, error: bucketErr } = await sb.storage.listBuckets();
    if (bucketErr) {
        log('err', '❌ Storage 访问失败: ' + bucketErr.message);
    } else {
        const names = (buckets || []).map(b => b.name).join(', ');
        log('ok', '✅ Storage 可访问，buckets: ' + (names || '（空）'));
    }

    // 6. 测试上传一个小文件
    log('warn', '· 测试上传小文件到 photos/uploads/...');
    const testBlob = new Blob(['test'], { type: 'text/plain' });
    const { error: upErr } = await sb.storage.from('photos').upload(
        'uploads/test_' + Date.now() + '.txt', testBlob, { upsert: true }
    );
    if (upErr) {
        log('err', '❌ Storage 上传失败: ' + upErr.message);
        log('err', '  → 检查 bucket RLS 或 uploads 子目录权限');
    } else {
        log('ok', '✅ Storage 上传成功！路径正常');
    }

    log('warn', '═══ 诊断完成 ═══');
}

testAll();
</script>
</body>
</html>
